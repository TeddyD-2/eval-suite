[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "eval-suite-core"
version = "0.1.0"
description = "eval-suite substrate: contracts, manifest, sweep driver, analysis, signing, registry, portal, conformance kit. Plugins target this."
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Teddy Duncker", email = "teddyduncker@gmail.com" }]
readme = "README.md"

dependencies = [
    "numpy>=1.24,<2.0",
    "cryptography>=42",
    "fastapi>=0.110",
    "jinja2>=3.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "mypy>=1.10",
    "ruff>=0.5",
    "httpx>=0.26",
]
portal = [
    "uvicorn[standard]>=0.27",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["eval_suite*"]
namespaces = true

[tool.setuptools.package-data]
"eval_suite.portal" = ["templates/*.html", "static/*.css"]
"eval_suite.calibration" = ["real_perf.json"]
