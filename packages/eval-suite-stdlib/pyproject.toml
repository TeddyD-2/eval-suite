[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "eval-suite-stdlib"
version = "0.1.0"
description = "eval-suite reference plugins: in-tree Tasks (SimplerEnv, LIBERO, Unitree Go1, USD scan, mock), Policies (SimplerEnv VLAs, random locomotion, mock), Adapters (gym, MuJoCo Playground). Structurally identical to a third-party plugin; bundled because the contract has to be proven on something."
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Teddy Duncker", email = "teddyduncker@gmail.com" }]
readme = "README.md"

dependencies = [
    "eval-suite-core>=0.1",
    "numpy>=1.24,<2.0",
]

[project.optional-dependencies]
# v1 Gaussian-splat → MJCF ingest pipeline. Pure-Python deps live here;
# the heavy GPU stacks (SuGaR, Nerfstudio) have churning CUDA pins and
# are documented in `eval_suite/ingest/splat/README.md` rather than
# hard-pinned. The convert pipeline calls them via subprocess and
# records commit SHAs in `convert_log.json` for provenance.
splat = [
    "trimesh>=4.0",
    "fast-simplification>=0.1",
    "scipy>=1.11",
    "manifold3d>=2.5",
]
# v2 Phase 1 — LeRobot interop. `lerobot` pulls torch + huggingface_hub
# transitively; `datasets` is here too so LeRobot's HF-format datasets
# work as a replay source for the calibration pillar.
lerobot = [
    "lerobot>=0.4",
    "torch>=2.2",
    "huggingface_hub>=0.24",
    "datasets>=2.18",
]
# v2 Phase 1 — Open-X-Embodiment / RLDS replay path. Separate extra
# because TF is a heavy install most users don't need.
oxe = [
    "tensorflow-datasets>=4.9",
    "tensorflow>=2.15",
]

[project.entry-points."eval_suite.tasks"]
google_robot_pick_coke_can = "eval_suite.tasks.simpler_env:GoogleRobotPickCokeCan"
widowx_spoon_on_towel      = "eval_suite.tasks.simpler_env:WidowXSpoonOnTowel"
unitree_go1_joystick       = "eval_suite.tasks.unitree_go1:UnitreeGo1Joystick"
libero_spatial             = "eval_suite.tasks.libero:LIBEROSpatial"
namaqualand_scan           = "eval_suite.tasks.usd_scan:NamaqualandScanTask"
tnt_truck_splat            = "eval_suite.tasks.parametric_splat:tnt_truck_splat_task_factory"
mock                       = "eval_suite.tasks.mock:MockTask"

[project.entry-points."eval_suite.policies"]
simpler_env       = "eval_suite.policies.simpler_env:SimplerEnvPolicy"
random_locomotion = "eval_suite.policies.random_locomotion:RandomLocomotionPolicy"
lerobot           = "eval_suite.policies.lerobot:LeRobotPolicy"
oxe_replay        = "eval_suite.policies.oxe_replay:OXEReplayPolicy"
mock              = "eval_suite.policies.mock:MockPolicy"

[project.entry-points."eval_suite.adapters"]
gym               = "eval_suite.adapters.gym:GymAdapter"
mujoco_playground = "eval_suite.adapters.mujoco_playground:MujocoPlaygroundAdapter"

[tool.setuptools.packages.find]
where = ["src"]
include = ["eval_suite*"]
namespaces = true
