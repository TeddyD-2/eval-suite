name: ros2-ci

# Tests the static layer of the ROS 2 bridge — TopicSpec, ProfileGate,
# YAML round-trips, sidecar I/O. The rclpy-backed runtime nodes need a
# full ROS 2 install (apt source from ros.org, ros-${ROS_DISTRO}-rclpy
# etc.) and are validated manually per release; the static layer is
# what protects the contract.

on:
  push:
    branches: [main]
    paths:
      - 'packages/eval-suite-ros2/**'
      - 'tests/test_topic_spec.py'
      - 'tests/test_profile_gate.py'
      - '.github/workflows/ros2-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/eval-suite-ros2/**'
      - 'tests/test_topic_spec.py'
      - 'tests/test_profile_gate.py'

concurrency:
  group: ros2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-layer:
    name: TopicSpec + ProfileGate contract tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install eval-suite + eval-suite-ros2
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/eval-suite-core[dev]" \
            -e packages/eval-suite-stdlib \
            -e packages/eval-suite-ros2

      - name: Static layer tests (no rclpy)
        run: pytest tests/test_topic_spec.py tests/test_profile_gate.py -ra --durations=10

      - name: Gate demo example runs cleanly
        run: python examples/gate_smolvla_deployment.py
