name: lerobot-ci

# Gated workflow for the [lerobot] + [oxe] extras. The default CI runner
# (ci.yml) doesn't install these — torch + lerobot + tensorflow is a
# heavy install and unnecessary for the substrate contract. This
# workflow runs the interop policy tests against a CPU-only install of
# the extras on a separate runner so a regression in either path is
# caught without slowing down the substrate CI loop.

on:
  push:
    branches: [main]
    paths:
      - 'packages/eval-suite-stdlib/src/eval_suite/policies/lerobot.py'
      - 'packages/eval-suite-stdlib/src/eval_suite/policies/oxe_replay.py'
      - 'tests/test_lerobot_interop.py'
      - 'tests/test_oxe_replay.py'
      - 'packages/eval-suite-stdlib/pyproject.toml'
      - '.github/workflows/lerobot-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/eval-suite-stdlib/src/eval_suite/policies/lerobot.py'
      - 'packages/eval-suite-stdlib/src/eval_suite/policies/oxe_replay.py'
      - 'tests/test_lerobot_interop.py'
      - 'tests/test_oxe_replay.py'
      - 'packages/eval-suite-stdlib/pyproject.toml'

concurrency:
  group: lerobot-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  interop:
    name: LeRobot + OXE replay interop tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install eval-suite (no extras)
        # The interop tests in this workflow guard the *no-extras* path:
        # registration via entry-points, lazy-load (heavy deps must NOT
        # be in sys.modules after importing the policy module), and the
        # helpful RuntimeError when an extra-gated constructor is called
        # without its extra. Installing torch / tensorflow / lerobot here
        # would turn most of those tests into skips and burn the runner's
        # 30-minute budget on a multi-gigabyte download. The actual
        # "does a real LeRobot checkpoint work end-to-end" gate lives on
        # a separate, GPU-equipped, on-demand runner (out of scope for
        # this push-triggered workflow).
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/eval-suite-core[dev]" \
            -e "packages/eval-suite-stdlib"

      - name: Interop contract tests (no extras)
        run: pytest tests/test_lerobot_interop.py tests/test_oxe_replay.py -ra --durations=10
