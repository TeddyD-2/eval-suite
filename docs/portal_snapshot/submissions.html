<h1>submissions <a class="json-link" href="/submissions">view as JSON</a></h1>

<form method="GET" action="/ui/submissions">
    model:       <input type="text" name="model"      value="">
    task:        <input type="text" name="task"       value="">
    embodiment:  <input type="text" name="embodiment" value="">
    submitter:   <input type="text" name="submitter"  value="">
    accepted:    <select name="accepted">
        <option value="any" selected>any</option>
        <option value="yes" >yes</option>
        <option value="no"  >no</option>
    </select>
    <button type="submit">filter</button>
    <a href="/ui/submissions">clear</a>
</form>


<p class="empty">
    
        no submissions yet &mdash; POST to <code>/submit</code> to add one.
    
</p>
